server:
  host: "localhost"
  port: 3000
  tls:
    enabled: false
    cert:
      file: "/etc/ssl/certs/server.crt"
    key:
      file: "/etc/ssl/private/server.key"

database:
  primary:
    host: "localhost"
    port: 5432
    database: "myapp_dev"
  pool:
    max:
      open: 10
      idle: 5

auth:
  jwt:
    secret: "dev-jwt-secret-change-in-production"
  token:
    duration: "24h"

features:
  debug:
    mode: true
